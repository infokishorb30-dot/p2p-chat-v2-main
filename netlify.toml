# Netlify Configuration for P2P Chat Application
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
# Command to build the project - ensure npm installs devDependencies
command = "npm ci && npm run build"

# Directory to publish (output of build)
publish = "dist"

# Node.js version
node_version = "18.18.0"

[build.environment]
# Production environment
NODE_ENV = "production"
# Force npm to install devDependencies
CI = "true"

# Single Page App (SPA) configuration
# All routes should serve index.html for React Router to handle navigation
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Security Headers
[[headers]]
for = "/*"
[headers.values]
# Prevent clickjacking attacks
X-Frame-Options = "DENY"

# Prevent MIME type sniffing
X-Content-Type-Options = "nosniff"

# Referrer policy
Referrer-Policy = "strict-origin-when-cross-origin"

# Cross-Origin Resource Sharing (for P2P WebRTC)
Access-Control-Allow-Origin = "*"
Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"

# Caching for static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"
